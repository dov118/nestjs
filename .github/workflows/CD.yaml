name: CD

on:
  push:
    branches:
      - 'release/*'

jobs:
  cd:
    name: CD
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.base_ref != 'refs/heads/main'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.16.0

      - name: Get version
        id: get_version
        run: |
          VERSION=`node -p "require('./package.json').version"`
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exist
        id: tag_exist
        run: |
          exist=`git tag -l ${{ steps.get_version.outputs.version }} | wc -l`
          echo "exist=$exist" >> $GITHUB_OUTPUT

      - name: Install node dependencies
        if: steps.tag_exist.outputs.exist == 0
        run: |
          npm ci --omit=dev --ignore-scripts

      - name: Build assets
        if: steps.tag_exist.outputs.exist == 0
        run: npm run build

      - name: Set up QEMU
        if: steps.tag_exist.outputs.exist == 0
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # 4.0.0

      - name: Login to Harbor
        if: steps.tag_exist.outputs.exist == 0
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # 4.0.0
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        if: steps.tag_exist.outputs.exist == 0
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # 4.0.0

      - name: Build and push docker image
        if: steps.tag_exist.outputs.exist == 0
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # 7.0.0
        with:
          context: .
          platforms: linux/amd64
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/${{ secrets.HARBOR_PROJECT }}/${{ secrets.HARBOR_REPOSITORY }}:${{ steps.get_version.outputs.version }}

      - name: Config git
        if: steps.tag_exist.outputs.exist == 0
        run: |
          git config --global user.email "contact.dov118.dev@gmail.com"
          git config --global user.name "dov118"

      - name: Set tag
        if: steps.tag_exist.outputs.exist == 0
        run: |
          git tag ${{ steps.get_version.outputs.version }}
          git push --tags
